    post:
      summary: Create a new version of a consent purpose
      description: |
        Creates a new version of an existing consent purpose. The version number is auto-incremented.

        Versions are **immutable** — once created, the element references of a version cannot be changed.
        To update a purpose's elements, create a new version instead.

        **Validation Rules:**
        - Purpose with the specified ID must exist
        - At least one element reference must be provided
        - Each element reference must specify `name` of an existing element version; `namespace` and `version` are optional
        - Duplicate element references within the same purpose version are not allowed
      operationId: createPurposeVersion
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: purposeId
          in: path
          required: true
          description: The unique identifier of the consent purpose
          schema:
            type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        description: New version data for the consent purpose
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentPurposeVersionCreateRequest"
            example:
              displayName: "Medical Data Access V2"
              description: "Updated access to basic medical record fields"
              properties:
                specialization: "general"
              elements:
                - name: "patient_name"
                  namespace: "medical"
                  version: "v1"
                  mandatory: true
                - name: "medical_history"
                  namespace: "medical"
                  version: "v2"
                  mandatory: false
      responses:
        "201":
          description: Successfully created new purpose version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentPurposeVersionResponse"
              example:
                purposeId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: "medical_data_access"
                groupId: "group-001"
                version: "v2"
                displayName: "Medical Data Access V2"
                description: "Updated access to basic medical record fields"
                properties:
                  specialization: "general"
                elements:
                  - elementId: "d4e5f6a7-b8c9-0123-defa-234567890123"
                    name: "patient_name"
                    namespace: "medical"
                    version: "v1"
                    mandatory: true
                  - elementId: "e5f6a7b8-c9d0-1234-efab-345678901234"
                    name: "medical_history"
                    namespace: "medical"
                    version: "v2"
                    mandatory: false
                createdTime: 1740787200000
        "400":
          description: Bad Request - Invalid input or validation error
          content:
