          example: 1702800000000
        groupId:
          type: string
        type:
          description: The type of consent (e.g., 'accounts', 'payments').
          type: string
          example: "accounts"
        status:
          description: "The current status of the consent in its lifecycle. Valid values are: CREATED, ACTIVE, REJECTED, REVOKED, EXPIRED. Status is derived from authorization state - APPROVED authorization yields ACTIVE, CREATED authorization yields CREATED, REJECTED authorization yields REJECTED."
          type: string
          example: "ACTIVE"
        frequency:
          description: For recurring consents, this indicates the frequency (e.g., per day). '0' may indicate no limit.
          type: integer
          format: int32
          example: 0
        expirationTime:
          description: Unix timestamp (milliseconds) when the consent expires. Set to 0 to indicate no expiration.
          type: integer
          format: int64
          example: 0
        recurringIndicator:
          description: A boolean flag indicating if the consent is for a recurring payment or access.
          type: boolean
          example: false
        dataAccessValidityDuration:
          description: The duration for which data access is valid, in seconds. Optional field that specifies how long the consent allows access to user data.
          type: integer
          format: int64
          example: 86400
        attributes:
          description: A key-value map of additional, non-standard attributes associated with the consent.
          type: object
          additionalProperties:
            type: string
          example:
            department: "sales"
            region: "APAC"
        authorizations:
          description: An array of authorization resources linked to this consent, detailing which users have acted upon it.
          type: array
          items:
            $ref: "#/components/schemas/ConsentAuthorizationCreateResponse"
    ConsentDetail:
      type: object
      description: A comprehensive object representing a single consent and all its associated data.
      required:
