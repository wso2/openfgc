          example: "first_name"
        namespace:
          type: string
          description: The namespace of the consent element
          example: "personal"
        version:
          type: string
          description: The version identifier
          example: "v1"
        type:
          type: string
          enum: [basic, json, xml]
          description: The element type
          example: "basic"
        displayName:
          type: string
          description: Human-readable display name
          example: "First Name"
        description:
          type: string
          description: Description of this version
          example: "Allows access to the user's first name"
        schema:
          type: string
          description: Validation schema (present for json and xml types)
          example: '{"type":"object"}'
        properties:
          type: object
          additionalProperties:
            type: string
          description: Key-value properties for this version
          example:
            resourcePath: "/Patient/{firstName}"
            jsonPath: "$.patient.firstName"
        createdTime:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds) when this version was created.
          example: 1736467200000
    ConsentElementVersionListResponse:
      type: object
