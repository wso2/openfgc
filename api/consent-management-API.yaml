    ValidateRequest:
      type: object
      description: Request payload for validating a consent for a specific action.
      required:
        - consentId
      properties:
        consentId:
          description: The unique identifier of the consent to validate.
          type: string
          example: "123e4567-e89b-12d3-a456-426614174000"
        userId:
          description: The unique identifier of the user performing the action (optional).
          type: string
          example: "user123"
        clientId:
          description: The client ID of the application making the request (optional).
          type: string
          example: "banking-app-001"
        headers:
          description: Optional headers from the actual API request being validated.
          type: object
          additionalProperties:
            type: string
        payload:
          description: Optional payload from the actual API request being validated.
          type: object
        electedResource:
          description: The resource the user is trying to access (optional).
          type: string
        resourceParams:
          description: Parameters describing the specific action being validated.
          type: object
          required:
            - resource
            - httpMethod
          properties:
            resource:
              description: The API resource path being accessed.
              type: string
              example: "/aisp/accounts/{AccountId}?queryParam=queryParamValue"
            httpMethod:
              description: The HTTP method of the request.
              type: string
              example: "GET"
            context:
              description: Additional context about the request.
              type: string
              example: "/open-banking/v3.1/aisp"
    ValidateResponse:
      type: object
      description: Response payload from consent validation.
      properties:
        isValid:
          description: Whether the consent is valid for the requested action.
          type: boolean
          example: true
        modifiedPayload:
          description: Optional modified payload if the consent requires transformation of the request.
          type: object
          nullable: true
        errorCode:
          description: HTTP status code if validation failed (e.g., 401, 404, 500).
          type: integer
          example: 401
        errorMessage:
          description: Error type/code if validation failed (e.g., "invalid_consent_status", "consent_expired", "consent_not_found").
          type: string
          example: "consent_expired"
        errorDescription:
          description: Human-readable detailed error description if validation failed.
          type: string
          example: "Consent has expired. Status updated to: EXPIRED"
        consentInformation:
          description: |
            Complete consent information (excludes modifiedResponse field).

            **Includes enriched consent element details:**
            - Each consent element includes type, description, and attributes from the purpose definition
            - This allows clients to understand what each purpose means without additional API calls

            Always present in the response, regardless of validation result.
          allOf:
            - $ref: "#/components/schemas/ValidateConsentAPIResponse"
    ValidateConsentAPIResponse:
      type: object
      description: Consent information in validate response (same as ConsentAPIResponse but excludes modifiedResponse field)
      properties:
        id:
          type: string
          description: Unique identifier for the consent (UUID format)
          example: "123e4567-e89b-12d3-a456-426614174000"
        type:
          type: string
          description: The consent type (e.g., accounts, payments, etc.)
          example: "accounts"
        clientId:
          type: string
          description: Client ID of the application that created the consent
          example: "client-app-123"
        status:
          type: string
          description: Current status of the consent (CREATED, ACTIVE, EXPIRED, REVOKED, REJECTED, etc.)
          example: "ACTIVE"
        createdTime:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the consent was created
          example: 1699564800
        updatedTime:
          type: integer
          format: int64
          description: Unix timestamp (seconds) when the consent was last updated
          example: 1699651200
        validityTime:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp (seconds) until which the consent is valid. If expired, status will be EXPIRED. Omitted from response when null.
          example: 1707340800
        recurringIndicator:
          type: boolean
          nullable: true
          description: Indicates if the consent can be used repeatedly. Omitted from response when null.
          example: true
        frequency:
          type: integer
          nullable: true
          description: Number of times the consent can be used (if recurringIndicator is true). Omitted from response when null.
          example: 10
        dataAccessValidityDuration:
          type: integer
          format: int64
          nullable: true
          description: Duration in seconds for which data access is valid after each authorization. Omitted from response when null.
          example: 86400
        purposes:
          type: array
          description: |
            List of purposes containing consent elements with their approval state, mandatory flag, and **enriched details from element definitions**.
            Each purpose contains:
            - name: Name of the purpose
            - elements: Array of elements in this purpose

            Each element includes:
            - name: Element identifier
            - value: User-provided value for this element (if any)
            - isUserApproved: Whether the user has approved this element (boolean, default false)
            - isMandatory: Whether this element is mandatory (boolean) - indicates if approval is required
            - type: Element type from definition (basic, json-payload, or resource-field)
            - description: Element description from definition
            - properties: Element properties from definition (e.g., validationSchema, resourcePath, jsonPath)
          items:
            type: object
            properties:
              name:
                type: string
                description: Name of the purpose
                example: "marketing_communication_preferences"
              elements:
                type: array
                description: List of consent elements in this purpose with enriched details
                items:
                  allOf:
                    - $ref: "#/components/schemas/ConsentElementApprovalItem"
                    - type: object
                      properties:
                        isMandatory:
                          type: boolean
                          description: Whether this element is mandatory for the consent (from purpose definition)
                          example: true
                        type:
                          type: string
                          enum: [basic, json-payload, resource-field]
                          description: Element type from the consent element definition
                          example: "resource-field"
                        description:
                          type: string
                          description: Element description from the consent element definition
                          example: "Allows access to the user's first name"
                        properties:
                          type: object
                          additionalProperties:
                            type: string
                          description: Element properties from the consent element definition
                          example:
                            jsonPath: "$.personal.firstName"
                            resourcePath: "/user/{nic}"
        attributes:
          type: object
          additionalProperties:
            type: string
          description: Custom key-value attributes associated with the consent
          example:
            channel: "mobile"
            region: "US"
        authorizations:
          type: array
          description: List of authorizations associated with this consent
          items:
            type: object
            properties:
              id:
                type: string
                example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              userId:
                type: string
                nullable: true
                description: User identifier. Omitted from response when null.
                example: "user-456"
              type:
                type: string
                example: "authorization"
              status:
                type: string
                example: "APPROVED"
              resources:
                type: object
                description: Authorization resources (always present, empty object if not set)
                example:
                  accountIds: ["123456", "789012"]
              updatedTime:
                type: integer
                format: int64
                example: 1699651200
      required:
        - id
        - type
        - clientId
        - status
        - createdTime
        - updatedTime
        - purposes
