  /consent-elements/validate:
    post:
      summary: Validate consent element names
      description: |
        Validates a list of consent element names and returns only the valid ones that exist in the database.

        This endpoint is useful for:
        - Validating element names before creating consents
        - Filtering out invalid elements from a list
        - Checking which elements are available in the organization

        **Behavior:**
        - Accepts an array of element names
        - Returns an array of names that exist in the organization
        - If none of the provided names are valid, returns 400 Bad Request
        - Names are case-sensitive and must match exactly
        - Empty request array returns 400 Bad Request

        **Response:**
        - **200 OK**: Returns array of valid element names (subset of input)
        - **400 Bad Request**: When request is empty or no valid elements found
      operationId: validateConsentPurposes
      tags:
        - Consent Elements
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
      requestBody:
        description: Array of element names to validate
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                type: string
              example:
                - "utility_read"
                - "taxes_read"
                - "profile_read"
            examples:
              allValid:
                summary: All purposes are valid
                value:
                  - "utility_read"
                  - "taxes_read"
              partialValid:
                summary: Some valid, some invalid
                value:
                  - "utility_read"
                  - "invalid_purpose"
                  - "taxes_read"
      responses:
        "200":
          description: Successfully validated elements (returns only valid ones)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
              examples:
                allValid:
                  summary: All provided elements were valid
                  value:
                    - "utility_read"
                    - "taxes_read"
                partialValid:
                  summary: Only valid elements returned
                  value:
                    - "utility_read"
                    - "taxes_read"
        "400":
          description: Bad Request - Empty request or no valid elements found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                emptyRequest:
                  summary: Empty request array
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "At least one element name must be provided"
                    traceId: "20260107T123456Z-abc123"
                noValidPurposes:
                  summary: No valid elements found
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "No valid elements found"
                    traceId: "20260107T123456Z-abc124"
                missingOrgId:
                  summary: Missing org-id header
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "Organization ID header is required"
                    traceId: "20260107T123456Z-abc125"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
