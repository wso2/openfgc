                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
components:
  schemas:
    ConsentPurposeItem:
      type: object
      description: |
        Represents a purpose within a consent, containing multiple related consent elements
        with their approval states.

        **Purpose Validation:**
        The `name` must reference an existing purpose in the organization.
        All element names within the `elements` array must exist and be part of the referenced purpose.

        **Usage:**
        Used in consent create/update requests and responses to organize consent elements into
        logical groupings (e.g., "marketing_communication_preferences_purpose").
      required:
        - name
        - elements
      properties:
        name:
          type: string
          description: |
            The name of an existing purpose to include in this consent.
            Must match the name of a purpose that has been previously created in the organization.
          example: "marketing_communication_preferences"
        elements:
          type: array
          minItems: 1
          description: |
            Array of consent elements within this purpose with their approval states.
            Each element must be defined in the referenced purpose.
          items:
            $ref: "#/components/schemas/ConsentElementApprovalItem"
    ConsentElementApprovalItem:
      type: object
      description: |
        Represents a single consent element approval within a consent.
        Contains the element name and whether the user has approved it.

        **Note:** The mandatory flag is defined at the purpose level,
        not at the individual consent level.
      required:
        - name
        - isUserApproved
      properties:
        name:
          type: string
          description: |
            The name of the consent element.
            Must match an existing element name and must be part of the parent purpose.
          example: "user_email"
        isUserApproved:
          type: boolean
          description: |
            Indicates whether the user has approved this specific consent element for this consent.

            - `true`: User has granted consent for this element
            - `false`: User has declined consent for this element

            **Validation:** If the element is marked as mandatory in the purpose definition,
            this field should typically be true for the consent to be valid.
          example: true
        value:
          description: |
            Optional element-specific value - flexible type that can be:
            - string: Simple text value
            - object: Structured data
            - array: List of values

            This field is OPTIONAL and can be used to store additional context or data
            specific to this element within the consent. Some elements may require a value,
            while others may not.
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          example:
            scope: "read"
            permissions: ["email", "profile"]
    AuthorizationResourceRequestBody:
      type: object
      description: |
        Payload for creating or updating an authorization resource.

        **Authorization Status/State:**
        The `status` field represents the authorization state which determines the consent status:
        - `approved` (default if not provided): Authorization is approved → consent will be "active"
        - `created`: Authorization is created but not yet approved → consent will be "created"
        - `rejected`: Authorization was rejected → consent will be "rejected"
        - Custom values: Will be resolved via extension point to one of the known consent statuses
      required:
        - type
      properties:
        userId:
          description: The unique ID of the user who performed this authorization.
          type: string
          example: "admin@carbon.super"
        type:
          description: The type of authorization (e.g., 'authorisation', 're-authorisation').
          type: string
          example: "authorisation"
        status:
          description: |
            The current status/state of this specific authorization.

            Defaults to "APPROVED" if not provided. Known states:
            - `APPROVED`: Authorization approved (default) → consent becomes ACTIVE
            - `CREATED`: Authorization created but not yet approved → consent becomes CREATED
            - `REJECTED`: Authorization rejected → consent becomes REJECTED
            - Custom states: Resolved via extension point
          type: string
          example: "APPROVED"
          enum:
            - CREATED
            - APPROVED
            - REJECTED
        resources:
          description: |
            Flexible resources field that can contain any valid JSON structure.

            This field replaces the deprecated `approvedPurposeDetails` and can be used to store:
            - Account information
            - Payment details
            - Resource identifiers
            - Any other authorization-specific data

            The API validates that this is valid JSON but does not enforce a specific schema.
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          example:
            accountIds: ["123456", "789012"]
            permissions: ["read", "write"]
    ConsentRevokePayload:
      type: object
      description: The request body for revoking a consent.
      required:
        - actionBy
      properties:
        actionBy:
          description: Identifier of the user or system performing the revoke action.
          type: string
          example: "admin@wso2.com"
        revocationReason:
          description: The reason for revoking the consent.
          type: string
          example: "Admin revoke"
    ConsentCreatePayload:
      type: object
      description: |
        The request body for initiating a new consent.

        **Status Derivation:**
        The consent status is NOT provided in the request. Instead, it is automatically derived by the API based on the authorization states:
        - If any authorization has status REJECTED → consent status = REJECTED
        - If any authorization has status CREATED → consent status = CREATED
        - If all authorizations have status APPROVED (or empty/default) → consent status = ACTIVE
        - For custom authorization states → consent status is resolved via extension point (must return a known status)

        **Known Consent Statuses:**
        - `CREATED`: Consent is created but not yet approved
        - `ACTIVE`: Consent is approved and active
        - `REJECTED`: Consent was rejected
        - `REVOKED`: Consent was revoked
        - `EXPIRED`: Consent has expired
      required:
        - type
        - purposes
      properties:
        type:
          description: The type of consent (e.g., 'accounts', 'payments', 'marketing').
          type: string
          example: "marketing"
        validityTime:
          description: The duration for which the consent is valid, in seconds. '0' may indicate it does not expire automatically.
          type: integer
          format: int64
          example: 1766383796
        recurringIndicator:
          description: A boolean flag indicating if the consent is for a recurring payment or access.
          type: boolean
          example: true
        dataAccessValidityDuration:
          description: The duration for which data access is valid, in seconds. Optional field that specifies how long the consent allows access to user data.
          type: integer
          format: int64
          example: 0
        frequency:
          description: For recurring consents, this indicates the frequency (e.g., per day). '0' may indicate no limit.
          type: integer
          format: int32
          example: 0
        purposes:
          description: |
            Array of purposes for this consent (REQUIRED).

            Each purpose contains multiple consent elements with their approval states.
            At least one purpose must be provided.
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ConsentPurposeItem"
        properties:
          description: A key-value map of additional, non-standard attributes associated with the consent.
          type: object
          additionalProperties:
            type: string
          example:
            department: "sales"
            region: "APAC"
        authorizations:
          description: An array of authorization resources linked to this consent, detailing which users have acted upon it.
          type: array
          items:
            $ref: "#/components/schemas/ConsentAuthorizationCreatePayload"
    ConsentAuthorizationCreatePayload:
      type: object
      description: |
        Represents a detailed authorization object.

        **Authorization State:**
        The status field represents the authorization state which determines the consent status:
        - `APPROVED` (default if not provided): Authorization is approved → consent will be ACTIVE
        - `CREATED`: Authorization is created but not yet approved → consent will be CREATED
        - `REJECTED`: Authorization was rejected → consent will be REJECTED
        - Custom states: Will be resolved via extension point to determine final consent status
      properties:
        userId:
          description: The unique ID of the user who performed this authorization.
          type: string
          example: "admin@carbon.super"
        type:
          description: The type of authorization (e.g., 'authorisation', 're-authorisation').
          type: string
          example: "authorisation"
        status:
          description: |
            The authorization state (defaults to APPROVED if not provided).
            Known states: APPROVED, CREATED, REJECTED.
            Custom states will be resolved via extension point.
          type: string
          example: "APPROVED"
          enum:
            - CREATED
            - APPROVED
            - REJECTED
        resources:
          description: |
            Flexible resources field that can contain any valid JSON structure.

            Can store account IDs, payment details, resource identifiers, or any
            other authorization-specific data. Validated as JSON but no schema enforced.
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          example:
            accountIds: ["123456", "789012"]
    ConsentAuthorizationCreateResponse:
      type: object
      description: Represents a detaild authorization object.
      properties:
        id:
          description: Auth Id
          type: string
          example: "auth_id"
        userId:
          description: The unique ID of the user who performed this authorization.
          type: string
          example: "admin@carbon.super"
        type:
          description: The type of authorization (e.g., 'authorisation', 're-authorisation').
          type: string
          example: "authorisation"
        status:
          description: The current status of this specific authorization (e.g., 'created', 'approved', 'rejected').
          type: string
          example: "created"
        updatedTime:
          type: integer
          format: int32
        resources:
          description: Flexible resources field containing authorization-specific data as JSON.
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          example:
            accountIds: ["123456", "789012"]
    ConsentErrorCommon:
      type: object
      description: A standardized error response object.
      properties:
        code:
          description: Error code.
          type: string
        message:
          description: A short, human-readable summary of the problem.
          type: string
        description:
          description: A detailed explanation of the error.
          type: string
        traceId:
          description: TraceId
          type: string
    ConsentSearchResponse:
      type: object
      description: The response from a successful consent search query.
      properties:
        data:
          description: An array of detailed consent objects matching the search criteria.
          type: array
          items:
            $ref: "#/components/schemas/ConsentDetail"
        metadata:
          $ref: "#/components/schemas/ConsentSearchMetadata"
    ConsentUpdateRequest:
      type: object
      description: |
        Request body for updating a consent.

        **Status Derivation:**
        The consent status is NOT provided in the request. Instead, it is automatically derived by the API based on the API based on the authorization states:
        - If any authorization has status "rejected" → consent status = "rejected"
        - If any authorization has status "created" → consent status = "created"
        - If all authorizations have status "approved" (or empty/default) → consent status = "active"
        - For custom authorization states → consent status is resolved via extension point (must return a known status)

        **Purposes:**
        The purposes field is REQUIRED and will completely replace existing consent elements.
        The API always clears existing element mappings and creates new ones from the request.
      required:
        - purposes
        - type
      properties:
        type:
          description: The type of consent (e.g., 'accounts', 'payments', 'marketing').
          type: string
          example: "marketing"
        validityTime:
          description: The duration for which the consent is valid, in seconds. '0' may indicate it does not expire automatically.
          type: integer
          format: int64
          example: 1766383796
        recurringIndicator:
          description: A boolean flag indicating if the consent is for a recurring payment or access.
          type: boolean
          example: true
        dataAccessValidityDuration:
          description: The duration for which data access is valid, in seconds. Optional field that specifies how long the consent allows access to user data.
          type: integer
          format: int64
          example: 0
        frequency:
          description: For recurring consents, this indicates the frequency (e.g., per day). '0' may indicate no limit.
          type: integer
          format: int32
          example: 0
        purposes:
          description: |
            Array of purposes for this consent (REQUIRED).

            This field completely replaces existing consent elements. All existing element mappings
            will be cleared and new ones created from this array.
          type: array
          minItems: 1
          items:
