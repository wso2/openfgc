        **Immutable fields** (set at element creation, cannot change across versions):
        - `name`: The element identifier
        - `namespace`: The element namespace. If namespace was omitted at creation, it was set to `default`.
        - `type`: The element type (`basic`, `json`, `xml`). Fixed at creation time.

        **Mutable fields** (can be updated in each new version):
        - `displayName`, `description`, `schema`, `properties`

        **Schema requirement:**
