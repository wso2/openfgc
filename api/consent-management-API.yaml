  /consent-purposes:
    post:
      summary: Create a consent purpose
      description: |
        Creates a new consent purpose that organizes related consent elements together.

        **Purpose Ownership (group-id header):**
        - If the `group-id` header is **omitted or empty**, the purpose is an **org-level purpose** —
          its `groupId` is set to the `org-id` and it is available to all consents within the organization.
        - If `group-id` is **provided**, the purpose is a **group-specific purpose** owned by that group
          and can only be used by consents that belong to the same group.

        **Validation Rules:**
        - Purpose name is required and must be unique within the organization and group.
        - Purpose name must not exceed 255 characters.
        - Description is optional but must not exceed 1024 characters if provided.
        - At least one element version reference must be provided in the elements array.
        - All element references must specify an existing element by `name` (and optionally `namespace` and `version`).
        - Duplicate element references within the same purpose are not allowed.

        **Mandatory Flag:**
        The `mandatory` flag on each element indicates whether that element must be
        approved for the consent to be valid. This provides fine-grained control over
        which elements are essential vs. optional within the purpose.
      operationId: createPurpose
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization that owns this purpose
          schema:
            type: string
            example: "ORG-001"
        - in: header
          name: group-id
          required: false
          description: |
            The group this purpose belongs to. When omitted, the purpose is created as an
            org-level purpose (groupId is set to the org-id) and is available to all consents
            within the organization.
          schema:
            type: string
            example: "group-001"
      requestBody:
        description: Purpose definition
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurposeCreateRequest"
            examples:
              marketingPurpose:
                summary: Marketing communication preferences purpose
                value:
                  name: "marketing_communication_preferences_purpose"
                  displayName: "Marketing Communication Preferences"
                  description: "User preferences related to marketing communications"
                  properties:
                    category: "marketing"
                    region: "global"
                  elements:
                    - name: "user_email"
                      namespace: "personal"
                      version: "v1"
                      mandatory: true
                    - name: "user_mobile"
                      namespace: "personal"
                      version: "v2"
                      mandatory: false
                    - name: "user_address"
                      namespace: "personal"
                      version: "v1"
                      mandatory: false
              govDataAccessPurpose:
                summary: Government data access purpose
                value:
                  name: "gov_data_access_purpose_attribute"
                  displayName: "Government Data Access"
                  description: "User consent to access user data in government portal"
                  properties:
                    sector: "government"
                  elements:
                    - name: "patient_name"
                      namespace: "medical"
                      version: "v1"
                      mandatory: false
                    - name: "medical_history"
                      namespace: "medical"
                      version: "v1"
                      mandatory: false
                    - name: "medical_record_id"
                      namespace: "medical"
                      version: "v1"
                      mandatory: true
      responses:
        "201":
          description: Successfully created purpose
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentPurposeCreateResponse"
              examples:
                marketingPurpose:
                  summary: Marketing purpose created
                  value:
                    purposeId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "marketing_communication_preferences_purpose"
                    groupId: "group-001"
                    version: "v1"
                    displayName: "Marketing Communication Preferences"
                    description: "User preferences related to marketing communications"
                    properties:
                      category: "marketing"
                      region: "global"
                    elements:
                      - elementId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "user_email"
                        namespace: "personal"
                        version: "v1"
                        mandatory: true
                      - elementId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "user_mobile"
                        namespace: "personal"
                        version: "v2"
                        mandatory: false
                    createdTime: 1742860800000
        "400":
          description: Bad Request - Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                missingName:
                  summary: Missing required name field
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request body"
                    description: "Name field is required"
                    traceId: "20260107T123456Z-abc123"
                duplicateName:
                  summary: Purpose name already exists
                  value:
                    code: "CONFLICT"
                    message: "Purpose already exists"
                    description: "Purpose name already exists"
                    traceId: "20260107T123456Z-abc123"
                emptyElements:
                  summary: No elements provided
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "At least one element must be provided"
                    traceId: "20260107T123456Z-abc123"
                elementNotFound:
                  summary: Referenced element doesn't exist
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid element reference"
                    description: "Element does not exist in organization"
                    traceId: "20260107T123456Z-abc123"
                duplicateElementInPurpose:
                  summary: Duplicate element in purpose
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "Duplicate element in purpose"
                    traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
    get:
      summary: List all purposes
      description: |
        Returns a paginated list of consent purposes for the organization.
        By default (`details=false`), each item includes the immutable fields (`purposeId`, `name`, `groupId`, `createdTime`), the latest `version` number, and the latest version's `displayName` and `description`.
        Set `details=true` to also include full version content (properties, elements).
        Use `purposeName`, `purposeVersion`, `elementName`, `elementNamespace`, `elementVersion`, or `groupIds` to filter results. If `purposeVersion` is specified, `purposeName` must also be provided. If `elementVersion` is specified, at least one of `elementName` or `elementNamespace` must also be provided.
      operationId: listPurposes
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: purposeName
          in: query
          required: false
          description: Filter by purpose name (partial match, case-insensitive)
          schema:
            type: string
          example: "marketing_communication_preferences"
        - name: purposeVersion
          in: query
          required: false
          description: |
            Filter by purpose version (e.g. "v2"). Requires purposeName to also be specified.
            Returns the purpose at that specific version instead of the latest.
          schema:
            type: string
          example: "v2"
        - name: elementName
          in: query
          required: false
          description: Filter by element name — returns purposes that contain this element
          schema:
            type: string
          example: "user_email"
        - name: elementNamespace
          in: query
          required: false
          description: Filter by element namespace — used together with elementName
          schema:
            type: string
          example: "personal"
        - name: elementVersion
          in: query
          required: false
          description: |
            Filter by a specific element version (e.g. "v2"). Requires at least one of elementName or elementNamespace to also be specified.
          schema:
            type: string
          example: "v2"
        - name: groupIds
          in: query
          required: false
          description: Comma-separated list of group IDs to filter purposes by
          schema:
            type: string
          example: "GROUP-123,GROUP-456"
        - name: details
          in: query
          required: false
          description: When `true`, each purpose in the response also includes full version content (properties, elements). `displayName` and `description` are always present regardless of this flag.
          schema:
            type: boolean
            default: false
          example: true
        - name: limit
          in: query
          description: Maximum number of results to return (default 10, max 100)
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
            maximum: 100
          example: 10
        - name: offset
          in: query
          description: Number of results to skip (for pagination)
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
          example: 0
      responses:
        "200":
          description: Successfully retrieved purposes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurposeListResponse"
              examples:
                summaryList:
                  summary: Default summary list (details=false)
                  value:
                    data:
                      - purposeId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "marketing_communication_preferences_purpose"
                        groupId: "group-001"
                        version: "v3"
                        displayName: "Marketing Communication Preferences"
                        description: "User preferences related to marketing communications"
                        createdTime: 1736467200000
                      - purposeId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "account_access_permissions_purpose"
                        groupId: "group-001"
                        version: "v1"
                        displayName: "Account Access Permissions"
                        description: "Permissions for accessing account data"
                        createdTime: 1739577600000
                    metadata:
                      total: 2
                      offset: 0
                      count: 2
                      limit: 10
                detailedList:
                  summary: Detailed list (details=true)
                  value:
                    data:
                      - purposeId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "marketing_communication_preferences_purpose"
                        groupId: "group-001"
                        version: "v3"
                        displayName: "Marketing Communication Preferences"
                        description: "User preferences related to marketing communications"
                        properties:
                          category: "marketing"
                          region: "global"
                        elements:
                          - elementId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                            name: "user_email"
                            namespace: "personal"
                            version: "v1"
                            mandatory: true
                          - elementId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                            name: "user_mobile"
                            namespace: "personal"
                            version: "v2"
                            mandatory: false
                        createdTime: 1736467200000
                    metadata:
                      total: 1
                      offset: 0
                      count: 1
                      limit: 10
                emptyResult:
                  summary: No purposes found
                  value:
                    data: []
                    metadata:
                      total: 0
                      offset: 0
                      count: 0
                      limit: 10
        "400":
          description: Bad Request - Invalid query parameters (e.g. purposeVersion provided without name)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "BAD_REQUEST"
                message: "Invalid query parameters"
                description: "purposeVersion requires purposeName to also be specified"
                traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
      security:
        - basicAuth: []
