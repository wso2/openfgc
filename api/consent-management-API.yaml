    put:
      summary: Update a purpose
      description: |
        Updates an existing consent purpose. This is a full replacement operation -
        all fields must be provided in the request.

        **Update Restrictions:**
        - Updates are only allowed if the purpose is not currently bound to any active consents.
        - If the purpose is referenced in any consent, the update will be rejected.

        **Element Name Validation:**
        All element names referenced in the updated `elements` array must already exist
        in the organization's consent elements.

        **Validation Rules:**
        - All fields from create request are required (full replacement)
        - Purpose name must be unique within organization and client (can keep same name)
        - All element names must reference existing consent elements
        - At least one element must be provided
        - Duplicate element names within the purpose are not allowed

        **Note:** This operation replaces the entire elements list - any elements not
        included in the update will be removed from the purpose.
      operationId: updatePurpose
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - in: header
          name: TPP-client-id
          required: true
          description: The client ID of the Third-Party Provider (TPP) application making the request
          schema:
            type: string
            example: "TPP-CLIENT-001"
        - name: purposeId
          in: path
          required: true
          description: The unique identifier of the purpose to update
          schema:
            type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        description: Updated purpose definition
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurposeUpdateRequest"
            examples:
              updateDescription:
                summary: Update purpose description and elements
                value:
                  name: "marketing_communication_preferences_purpose"
                  description: "Updated preferences for all marketing communications"
                  elements:
                    - name: "user_email"
                      isMandatory: true
                    - name: "user_phone"
                      isMandatory: true
                    - name: "user_sms"
                      isMandatory: false
              addElement:
                summary: Add new element to purpose
                value:
                  name: "marketing_communication_preferences_purpose"
                  description: "User preferences related to marketing communications"
                  elements:
                    - name: "user_email"
                      isMandatory: true
                    - name: "user_phone"
                      isMandatory: false
                    - name: "user_address"
                      isMandatory: false
                    - name: "user_push_notifications"
                      isMandatory: false
      responses:
        "200":
          description: Successfully updated purpose
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurposeResponse"
              example:
                id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                name: "marketing_communication_preferences_purpose"
                description: "Updated preferences for all marketing communications"
                clientId: "CLIENT-456"
                elements:
                  - name: "user_email"
                    isMandatory: true
                  - name: "user_phone"
                    isMandatory: true
                  - name: "user_sms"
                    isMandatory: false
                createdTime: 1704153600
                updatedTime: 1704240000
        "400":
          description: Bad Request - Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                elementNotFound:
                  summary: Referenced element doesn't exist
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid element reference"
                    description: "Element does not exist in organization"
                    traceId: "20260107T123456Z-abc123"
                duplicateName:
                  summary: Name conflicts with another purpose
                  value:
                    code: "CONFLICT"
                    message: "Purpose name conflict"
                    description: "Purpose name already exists"
                    traceId: "20260107T123456Z-abc123"
        "404":
          description: Purpose not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "NOT_FOUND"
                message: "Purpose not found"
                description: "Purpose does not exist"
                traceId: "20260107T123456Z-abc123"
        "409":
          description: Conflict - Purpose is bound to existing consents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "CONFLICT"
                message: "Cannot update purpose"
                description: "Purpose is currently bound to active consents and cannot be updated"
                traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
    delete:
      summary: Delete a purpose
      description: |
        Deletes a consent purpose. The purpose must exist and belong to the specified organization.

        **Delete Restrictions:**
        - Deletion is only allowed if the purpose is not currently bound to any active consents.
        - If the purpose is referenced in any consent, the deletion will be rejected.

        **Cascade Behavior:**
        Deleting a purpose only removes the purpose definition itself. It does NOT delete
        the individual consent elements that were part of the purpose - those remain available
        for use in other purposes or directly in consents.
      operationId: deletePurpose
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: purposeId
          in: path
          required: true
          description: The unique identifier of the purpose to delete
          schema:
            type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "204":
          description: Successfully deleted purpose (no content returned)
        "404":
          description: Purpose not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "NOT_FOUND"
                message: "Purpose not found"
                description: "Purpose does not exist"
                traceId: "20260107T123456Z-abc123"
        "409":
          description: Conflict - Purpose is bound to existing consents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "CONFLICT"
                message: "Cannot delete purpose"
                description: "Purpose is currently bound to active consents and cannot be deleted"
                traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
