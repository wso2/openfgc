                  summary: Basic type element created
                  value:
                    data:
                      - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "license_read"
                        description: "Allows accessing license API"
                        type: "basic"
                        properties:
                          value: "license:read"
                    message: "Consent elements created successfully"
                jsonPayloadType:
                  summary: JSON payload type element created
                  value:
                    data:
                      - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "account_schema"
                        description: "Account access schema validation"
                        type: "json-payload"
                        properties:
                          validationSchema: '{"type":"object","properties":{"accountId":{"type":"string"}}}'
                    message: "Consent elements created successfully"
                resourceFieldType:
                  summary: Resource field type element created
                  value:
                    data:
                      - id: "c3d4e5f6-a7b8-9012-cdef-123456789012"
                        name: "first_name"
                        description: "Allows access to the user's first name"
                        type: "resource-field"
