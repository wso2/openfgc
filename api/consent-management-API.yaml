    PurposeVersionElementResponse:
      type: object
      required:
        - elementId
        - name
        - namespace
        - version
        - mandatory
      description: |
        A resolved element reference within a purpose version response.
        The server always returns elementId, name, namespace, and the resolved version.
      properties:
        elementId:
          type: string
          description: The unique identifier of the consent element
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: The name/identifier of the consent element
          example: "user_email"
        namespace:
          type: string
          description: The namespace of the consent element
          example: "personal"
        version:
          type: string
          description: The specific version of the element referenced in this purpose version (e.g., v1, v2)
          example: "v1"
        mandatory:
          type: boolean
          description: |
            Whether this element must be approved for the consent to be valid.
            - `true`: Element approval is required
            - `false`: Element approval is optional
          example: true
    PurposeVersionElementItem:
      type: object
      required:
        - name
        - mandatory
      description: A reference to a consent element within a purpose version, identified by name, namespace, and version. If `namespace` is not specified, the default namespace is used. If `version` is not specified, the latest version of the element is used.
      properties:
        name:
          type: string
          description: The name of the consent element
          example: "user_email"
        namespace:
          type: string
          description: The namespace of the consent element. If omitted, the default namespace is used.
          example: "personal"
        version:
          type: string
          description: The specific version of the element to reference (e.g., v1, v2). If omitted, the latest version is used.
          example: "v1"
        mandatory:
          type: boolean
          description: |
            Whether this element must be approved for the consent to be valid.
            - `true`: Element approval is required
            - `false`: Element approval is optional
          example: true
