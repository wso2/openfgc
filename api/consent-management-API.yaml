                    properties:
                      validationSchema: |
                        {
                          "type": "object",
                          "properties": {
                            "accountId": {"type": "string"},
                            "permissions": {"type": "array", "items": {"type": "string"}}
                          },
                          "required": ["accountId"]
                        }
              resourceFieldType:
