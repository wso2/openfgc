  /consent-elements:
    post:
      summary: Create one or more consent elements
      description: |
        Creates one or more consent elements in a single request. Supports batch creation by accepting
        an array of element definitions.

        When creating a consent, a value can be provided for each consent element. Based on the value type,
        consent elements have three types:
        - **basic**: Element value is treated as a simple string with no structural validation.
        - **json**: Element value is a JSON string, validated against the provided json element schema at consent creation time.
        - **xml**: Element value is an XML string, validated against the provided xml element schema at consent creation time.

        **Validation Rules:**
        - Name is required and must not exceed 255 characters
        - The combination of `name` + `namespace` must be unique within the organization
        - Type is required and must be one of: `basic`, `json`, `xml`
        - At least one element must be provided in the request array
      operationId: createConsentElements
      tags:
        - Consent Elements
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization that owns these elements
          schema:
            type: string
            example: "ORG-001"
      requestBody:
        description: Array of consent elements to create
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ConsentElementCreateRequest"
            examples:
              basicElement:
                summary: Create a basic type element (namespace omitted — uses "default")
                value:
                  - name: "license_read"
                    type: "basic"
                    displayName: "License Read"
                    description: "Allows read access to license API endpoints"
                    properties:
                      value: "license:read"
                      resourcePath: "/api/license/{id}"
              jsonElement:
                summary: Create a json type element with schema validation
                value:
                  - name: "account_details"
                    type: "json"
                    displayName: "Account Details"
                    description: "Structured account information with JSON schema validation"
                    schema: '{"type":"object","properties":{"accountId":{"type":"string"},"balance":{"type":"number"}},"required":["accountId"]}'
                    properties:
                      resourcePath: "/accounts/{accountId}"
                      jsonPath: "$.account"
              xmlElement:
                summary: Create an xml type element with schema validation
                value:
                  - name: "patient_record_xml"
                    type: "xml"
                    displayName: "Patient Record (XML)"
                    description: "Patient record data validated against XML schema"
                    schema: '<xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema"><xs:element name="patient"><xs:complexType><xs:sequence><xs:element name="patientId" type="xs:string"/></xs:sequence></xs:complexType></xs:element></xs:schema>'
                    properties:
                      resourcePath: "/Patient/{patientId}"
                      xPath: "/patient/patientId"
              batchElements:
                summary: Create multiple elements in one batch (with explicit namespaces)
                value:
                  - name: "first_name"
                    namespace: "personal"
                    type: "basic"
                    displayName: "First Name"
                    description: "Access to the user's first name"
                    properties:
                      resourcePath: "/Patient/{firstName}"
                      jsonPath: "$.patient.firstName"
                  - name: "patient_record"
                    namespace: "healthcare"
                    type: "json"
                    displayName: "Patient Record"
                    description: "Full patient record with JSON schema validation"
                    schema: '{"type":"object","properties":{"patientId":{"type":"string"},"dob":{"type":"string","format":"date"}},"required":["patientId"]}'
                    properties:
                      resourcePath: "/Patient/{patientId}"
                      jsonPath: "$.patient"
      responses:
        "200":
          description: |
            Bulk creation processed. Check each item's `status` field — `SUCCESS` or `FAILED`.
            Valid items are batch-inserted; per-item validation errors do not prevent other items from being created.
            See `metadata` for a summary of how many succeeded and failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentElementBulkCreateResponse"
              examples:
                partialSuccess:
                  summary: Batch with one success and one failure
                  value:
                    metadata:
                      traceId: "4f9c2d7a-8b1e-4f9c-2d7a-8b1e4f9c2d7a"
                      total: 2
                      succeeded: 1
                      failed: 1
                    results:
                      - index: 0
                        status: "SUCCESS"
                        data:
                          elementId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                          name: "license_read"
                          namespace: "licensing"
                          type: "basic"
                          version: "v1"
                          displayName: "License Read"
                          description: "Allows read access to license API endpoints"
                          properties:
                            value: "license:read"
                            resourcePath: "/api/license/{id}"
                          createdTime: 1742860800000
                      - index: 1
                        status: "FAILED"
                        error:
                          code: "CONFLICT"
                          message: "Element already exists"
                          description: "Element name 'user_email' already exists in namespace 'personal'"
        "400":
          description: Bad Request — invalid top-level request (e.g. malformed JSON, empty array)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                emptyArray:
                  summary: Empty array provided
                  value:
                    code: "BAD_REQUEST"
                    message: "Empty request"
                    description: "At least one element must be provided"
                    traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error — batch persistence failed after successful validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred while persisting elements"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
    get:
      summary: List all consent elements
      description: |
        Returns a paginated list of consent elements for the organization.

        By default (`details=false`), each item includes the immutable fields (`elementId`, `name`, `namespace`, `type`, `createdTime`), the latest `version` number, and the latest version's `displayName` and `description`.
        Set `details=true` to also include the full version content (schema, properties).

        Use `name`, `namespace`, or `type` to filter results. If `version` is specified, at least one of `name` or `namespace` must also be provided.
      operationId: listConsentElements
      tags:
        - Consent Elements
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: name
          in: query
          description: Filter elements by name (partial match, case-insensitive search)
          required: false
          schema:
            type: string
            example: "account"
        - name: namespace
          in: query
          description: Filter elements by namespace
          required: false
          schema:
            type: string
            example: "healthcare"
        - name: type
          in: query
          description: Filter elements by type
          required: false
          schema:
            type: string
            enum: [basic, json, xml]
            example: "basic"
        - name: version
          in: query
          description: |
            Filter by a specific version (e.g. `v2`). When provided, returns content of that
            version instead of the latest. Requires at least one of `name` or `namespace`.
          required: false
          schema:
            type: string
            example: "v2"
        - name: details
          in: query
          description: |
            When `true`, each element in the response also includes the full version content (schema, properties).
            `displayName` and `description` are always present regardless of this flag.
          required: false
          schema:
            type: boolean
            default: false
            example: true
        - name: limit
          in: query
          description: The maximum number of results to return in a single page. Used for pagination.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 100
            example: 10
        - name: offset
          in: query
          description: The number of results to skip. Used for pagination.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
            example: 0
      responses:
        "200":
          description: |
            Successfully retrieved consent elements.
            Shape of each item depends on `details` parameter — see `ConsentElementSummaryResponse` (default)
            and `ConsentElementVersionResponse` (when `details=true`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentElementListResponse"
              examples:
                summary:
                  summary: Default response (details=false)
                  value:
                    data:
                      - elementId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "first_name"
                        namespace: "personal"
                        type: "basic"
                        version: "v3"
                        displayName: "First Name"
                        description: "Access to the user's first name"
                        createdTime: 1736467200000
                      - elementId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "account_details"
                        namespace: "banking"
                        type: "json"
                        version: "v2"
                        displayName: "Account Details"
                        description: "Structured account information with JSON schema validation"
                        createdTime: 1738368000000
                    metadata:
                      total: 2
                      offset: 0
                      count: 2
                      limit: 100
                enriched:
                  summary: Detailed response (details=true)
                  value:
                    data:
                      - elementId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "first_name"
                        namespace: "personal"
                        type: "basic"
                        version: "v3"
                        displayName: "First Name"
                        description: "User's first name"
                        properties:
                          resourcePath: "/Patient/{firstName}"
                          jsonPath: "$.patient.firstName"
                        createdTime: 1736467200000
                      - elementId: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "account_details"
                        namespace: "banking"
                        type: "json"
                        version: "v2"
                        displayName: "Account Details"
                        description: "Bank account information"
                        schema: '{"type":"object"}'
                        properties:
                          resourcePath: "/accounts/{accountId}"
                          jsonPath: "$.account"
                        createdTime: 1738368000000
                    metadata:
                      total: 2
                      offset: 0
                      count: 2
                      limit: 100
        "400":
          description: Bad Request — `version` provided without `name` or `namespace`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INVALID_REQUEST"
                message: "Invalid query parameters"
                description: "The 'version' parameter requires at least one of 'name' or 'namespace' to be specified"
                traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Internal server error"
