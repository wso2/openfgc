  /consent-purposes:
    post:
      summary: Create a consent purpose
      description: |
        Creates a new consent purpose that organizes related consent elements together.
        Each purpose is bound to a specific client ID (specified in TPP-client-id header) and 
        enables streamlined consent collection by defining which elements are mandatory and which are optional.

        **Validation Rules:**
        - Purpose name is required and must be unique within the organization and client.
        - Purpose name must not exceed 255 characters.
        - Description is optional but must not exceed 1024 characters if provided.
        - At least one element must be provided in the elements array.
        - All element names in the purpose must reference existing valid consent elements.
        - Duplicate element names within the same purpose are not allowed.
        - Purpose is bound to the client ID specified in the TPP-client-id header.

        **Mandatory Flag:**
        The `isMandatory` flag on each element indicates whether that element must be
        approved for the consent to be valid. This provides fine-grained control over
        which elements are essential vs. optional within the purpose.
      operationId: createPurpose
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization that owns this purpose
          schema:
            type: string
            example: "ORG-001"
        - in: header
          name: TPP-client-id
          required: true
          description: The client ID of the Third-Party Provider (TPP) application making the request.
          schema:
            type: string
            example: "TPP-CLIENT-001"
      requestBody:
        description: Purpose definition
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurposeCreateRequest"
            examples:
              marketingPurpose:
                summary: Marketing communication preferences purpose
                value:
                  name: "marketing_communication_preferences_purpose"
                  description: "User preferences related to marketing communications"
                  elements:
                    - name: "user_email"
                      isMandatory: true
                    - name: "user_phone"
                      isMandatory: false
                    - name: "user_address"
                      isMandatory: false
              govDataAccessPurpose:
                summary: Government data access purpose
                value:
                  name: "gov_data_access_purpose_attribute"
                  description: "User consent to access user data in government portal"
                  elements:
                    - name: "first_name"
                      isMandatory: false
                    - name: "last_name"
                      isMandatory: false
                    - name: "address"
                      isMandatory: true
      responses:
        "201":
          description: Successfully created purpose
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurposeResponse"
              examples:
                marketingPurpose:
                  summary: Marketing purpose created
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "marketing_communication_preferences_purpose"
                    description: "User preferences related to marketing communications"
                    clientId: "CLIENT-456"
                    elements:
                      - name: "user_email"
                        isMandatory: true
                      - name: "user_phone"
                        isMandatory: false
                      - name: "user_address"
                        isMandatory: false
                    createdTime: 1704153600
                    updatedTime: 1704153600
        "400":
          description: Bad Request - Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                missingName:
                  summary: Missing required name field
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request body"
                    description: "Name field is required"
                    traceId: "20260107T123456Z-abc123"
                duplicateName:
                  summary: Purpose name already exists
                  value:
                    code: "CONFLICT"
                    message: "Purpose already exists"
                    description: "Purpose name already exists"
                    traceId: "20260107T123456Z-abc123"
                emptyElements:
                  summary: No elements provided
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "At least one element must be provided"
                    traceId: "20260107T123456Z-abc123"
                elementNotFound:
                  summary: Referenced element doesn't exist
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid element reference"
                    description: "Element does not exist in organization"
                    traceId: "20260107T123456Z-abc123"
                duplicateElementInPurpose:
                  summary: Duplicate element in purpose
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "Duplicate element in purpose"
                    traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
    get:
      summary: List all purposes
      description: |
        Retrieves a paginated list of all consent purposes for the specified organization.

        **Filtering Options:**
        - **name**: Filter by purpose name (partial match, case-insensitive LIKE search)
        - **elementNames**: Comma-separated element names - returns purposes containing ALL specified elements
        - **clientIds**: Filter by client IDs to get purposes bound to specific clients

        **Search Logic for elementNames:**
        When multiple element names are provided (e.g., "user_email,user_phone"), the API returns only
        purposes that include ALL of the specified elements (AND operation). This helps find purposes that
        satisfy a specific set of consent requirements.

        Results are sorted by creation time (newest first) and support pagination via limit/offset.
      operationId: listPurposes
      tags:
        - Consent Purposes
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: clientIds
          in: query
          required: false
          description: Comma-separated list of client IDs to filter purposes by
          schema:
            type: string
          example: "CLIENT-123,CLIENT-456"
        - name: name
          in: query
          required: false
          description: Filter by purpose name
          schema:
            type: string
          example: "marketing_communication_preferences"
        - name: elementNames
          in: query
          required: false
          description: |
            Comma-separated list of element names to filter by.
            Returns purposes that contain ALL the specified elements (AND logic).
            Example: "user_email,user_phone" will return purposes containing both elements.
          schema:
            type: string
          example: "user_email,user_phone"
        - name: limit
          in: query
          description: Maximum number of results to return (default 10, max 100)
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
            maximum: 100
          example: 10
        - name: offset
          in: query
          description: Number of results to skip (for pagination)
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
          example: 0
        - name: count
          in: query
          description: If true, returns only the total count without the data array
          schema:
            type: boolean
            default: false
          example: false
      responses:
        "200":
          description: Successfully retrieved purposes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurposeListResponse"
              examples:
                withPurposes:
                  summary: Multiple purposes returned
                  value:
                    data:
                      - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "marketing_communication_preferences_purpose"
                        description: "User preferences related to marketing communications"
                        clientId: "CLIENT-456"
                        elements:
                          - name: "user_email"
                            isMandatory: true
                          - name: "user_phone"
                            isMandatory: false
                        createdTime: 1704153600
                        updatedTime: 1704153600
                      - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        name: "account_access_permissions_purpose"
                        description: "Permissions for accessing account information"
                        clientId: "CLIENT-789"
                        elements:
                          - name: "account_basic_info"
                            isMandatory: true
                          - name: "account_balance"
                            isMandatory: true
                        createdTime: 1704067200
                        updatedTime: 1704067200
                    metadata:
                      total: 2
                      offset: 0
                      count: 2
                      limit: 10
                emptyResult:
                  summary: No purposes found
                  value:
                    data: []
                    metadata:
                      total: 0
                      offset: 0
                      count: 0
                      limit: 10
                filteredByElements:
                  summary: Filtered by element names
                  value:
                    data:
                      - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        name: "marketing_communication_preferences_purpose"
                        description: "User preferences related to marketing communications"
                        clientId: "CLIENT-456"
                        elements:
