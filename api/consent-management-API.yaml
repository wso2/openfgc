      requestBody:
        description: Array of consent elements to create
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              items:
                $ref: "#/components/schemas/ConsentElementCreateRequest"
            examples:
              stringType:
                summary: Basic type with optional properties
                value:
                  - name: "license_read"
                    description: "Allows accessing license API"
                    type: "basic"
                    properties:
                      value: "license:read"
              stringTypeNoAttributes:
                summary: Basic type without properties (valid)
                value:
                  - name: "basic_access"
                    type: "basic"
              jsonPayloadType:
                summary: JSON payload type with validationSchema
                value:
                  - name: "account_schema"
                    description: "Account access schema validation"
