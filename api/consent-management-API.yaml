    put:
      summary: Update a consent element
      description: |
        Updates an existing consent element. **All fields are required** - partial updates are not supported.

        **Type Handlers:**
        Each element has a type that determines which properties are mandatory:
        - **basic**: No mandatory properties (any properties are optional)
        - **json-payload**: Requires `validationSchema` property
        - **resource-field**: Requires both `resourcePath` and `jsonPath` properties

        **Update Behavior:**
        - All fields (name, description, type, properties) must be provided in the request
        - The element type can be changed, but new type's property requirements must be satisfied
        - Name must remain unique within the organization (or be the same as current name)
        - The update is transactional - either all fields are updated or none

        **Validation Rules:**
        - Name is required and must not exceed 255 characters
        - Name must be unique within the organization (excluding the current element)
        - Type is required and must be one of: `basic`, `json-payload`, `resource-field`
        - Properties validation depends on type (see Type Handlers above)
        - Description is optional but must not exceed 1024 characters if provided
      operationId: updateConsentPurpose
      tags:
        - Consent Elements
      parameters:
        - in: header
          name: org-id
          required: true
          description: The unique identifier for the organization
          schema:
            type: string
            example: "ORG-001"
        - name: elementId
          in: path
          required: true
          description: The unique identifier of the consent element to update
          schema:
            type: string
            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      requestBody:
        description: Complete element data (all fields required - no partial updates)
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentElementUpdateRequest"
            examples:
              updateToString:
                summary: Update to basic type (no mandatory properties)
                value:
                  name: "license_read_updated"
                  description: "Updated license access permission"
                  type: "basic"
                  properties:
                    value: "license:read:v2"
              updateToJsonSchema:
                summary: Update to JSON Schema type (requires validationSchema)
                value:
                  name: "account_schema_v2"
                  description: "Updated account schema validation"
                  type: "json-payload"
                  properties:
                    validationSchema: |
                      {
                        "type": "object",
                        "properties": {
                          "accountId": {"type": "string"},
                          "permissions": {"type": "array"}
                        },
                        "required": ["accountId"]
                      }
              updateToResourceField:
                summary: Update to resource-field type (requires resourcePath and jsonPath)
                value:
                  name: "first_name"
                  description: "Allows access to the user's first name"
                  type: "resource-field"
                  properties:
                    resourcePath: "/user/{nic}"
                    jsonPath: "$.personal.firstName"
      responses:
        "200":
          description: Successfully updated consent element
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentElementResponse"
              examples:
                stringType:
                  summary: Updated to basic type
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "license_read_updated"
                    description: "Updated license access permission"
                    type: "basic"
                    properties:
                      value: "license:read:v2"
                jsonPayloadType:
                  summary: Updated to JSON Schema type
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "account_schema_v2"
                    description: "Updated account schema validation"
                    type: "json-payload"
                    properties:
                      validationSchema: '{"type":"object","properties":{"accountId":{"type":"string"}}}'
                resourceFieldType:
                  summary: Updated to resource-field type
                  value:
                    id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    name: "first_name"
                    description: "Allows access to the user's first name"
                    type: "resource-field"
                    properties:
                      resourcePath: "/user/{nic}"
                      jsonPath: "$.personal.firstName"
        "400":
          description: Bad Request - Invalid input or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              examples:
                missingName:
                  summary: Missing required field (name)
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid request"
                    description: "Element name is required"
                    traceId: "20260107T123456Z-abc123"
                invalidType:
                  summary: Invalid type value
                  value:
                    code: "BAD_REQUEST"
                    message: "Invalid element type"
                    description: "Type must be one of: basic, json-payload, resource-field"
                    traceId: "20260107T123456Z-abc123"
                jsonSchemaMissingValidationSchema:
                  summary: JSON payload type missing validationSchema
                  value:
                    code: "BAD_REQUEST"
                    message: "Validation failed"
                    description: "validationSchema is required for json-payload type"
                    traceId: "20260107T123456Z-abc123"
                attributeMissingResourcePath:
                  summary: Resource field type missing resourcePath
                  value:
                    code: "BAD_REQUEST"
                    message: "Validation failed"
                    description: "resourcePath is required for resource-field type"
                    traceId: "20260107T123456Z-abc123"
                duplicateName:
                  summary: Name already exists in organization
                  value:
                    code: "CONFLICT"
                    message: "Element already exists"
                    description: "Element name already exists in organization"
                    traceId: "20260107T123456Z-abc123"
        "404":
          description: Consent element not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "NOT_FOUND"
                message: "Element not found"
                description: "Consent element does not exist"
                traceId: "20260107T123456Z-abc123"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentErrorCommon"
              example:
                code: "INTERNAL_ERROR"
                message: "Server error"
                description: "An unexpected error occurred"
                traceId: "20260107T123456Z-abc123"
      security:
        - basicAuth: []
    delete:
      summary: Delete a consent element
      description: |
        Deletes a consent element. The element must exist and belong to the specified organization.

        **Note:** This operation will not delete any mappings if the element is currently linked to consents.
