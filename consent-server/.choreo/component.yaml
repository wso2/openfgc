schemaVersion: 1.2
endpoints:
  - name: open-fgc-service
    displayName: Open FGC Service
    service:
      basePath: /api/v1/
      port: 8080
    type: REST
    networkVisibilities:
      - Project
      - Public
    schemaFilePath: ../api/consent-management-API.yaml

dependencies:
    serviceReferences:
    - name: database:openfgc_db
      connectionConfig: 01f10c8a-01c6-1770-b39b-9c203dacb167
      env:
      - from: HostName
        to: OPENFGC_DB_HOSTNAME
      - from: Port
        to: OPENFGC_DB_PORT
      - from: Username
        to: OPENFGC_DB_USER
      - from: Password
        to: OPENFGC_DB_PASSWORD
      - from: DatabaseName
        to: OPENFGC_DB_NAME
