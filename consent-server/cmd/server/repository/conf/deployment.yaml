server:
  hostname: localhost
  port: 8060
  readTimeout: 30s
  writeTimeout: 30s
  idleTimeout: 120s

database:
  consent:
    type: sqlite
    # Path to the SQLite database file (relative to the server binary)
    path: ./repository/database/consent.db
    # Optional DSN query parameters for additional SQLite pragmas
    # options: "_pragma=journal_mode(WAL)&_pragma=cache_size(-16000)"
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: 5m

logging:
  level: info

# Consent configuration
consent:
  # Periodical expiration job configuration.
  # When enabled, the scheduler runs at the given frequency and marks eligible
  # consents as expired based on their expirationTime.
  periodical_expiration:
    # Set false to disable the background expiration job entirely.
    enabled: true
    # How often the scheduler runs. Supports Go duration format: "30s", "5m", "1h", "24h"
    frequency: "1h"
    # Consents with these statuses are eligible to be checked for expiration.
    # Only consents matching these statuses will be picked up by the expiration job.
    eligible_statuses: ["ACTIVE"]

  status_mappings:
    # Status representing an active/authorized consent
    active_status: ACTIVE
    # Status representing an expired consent
    expired_status: EXPIRED
    # Status representing a revoked consent
    revoked_status: REVOKED
    # Status representing a created consent
    created_status: CREATED
    # Status representing a rejected consent
    rejected_status: REJECTED

  auth_status_mappings:
    # Authorization state indicating approval
    approved_state: APPROVED
    # Authorization state indicating rejection
    rejected_state: REJECTED
    # Authorization state indicating creation
    created_state: CREATED
    # Authorization state indicating authorization was system-expired due to consent expiry
    system_expired_state: SYS_EXPIRED
    # Authorization state indicating authorization was system-revoked due to consent revocation
    system_revoked_state: SYS_REVOKED
  history:
    # Enables full consent history snapshots.
    enabled: false
